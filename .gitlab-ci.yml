deploy_straivedemo_SG:
  stage: deploy
  tags:
    - straivedemo9
  image: instrumentisto/rsync-ssh
  script:
    - chmod og= $ID_RSA
    - rsync -avz -e "ssh -i $ID_RSA -o StrictHostKeyChecking=no" --no-perms --no-times ./ $SERVER_USER@$SERVER_IP_SG:/var/www/html/ai-powered-intelligent-pack-design


deploy_straivedemo_US:
  stage: deploy
  tags:
    - straivedemo10
  image: instrumentisto/rsync-ssh
  script:
    - chmod og= $ID_RSA
    - rsync -avz -e "ssh -i $ID_RSA -o StrictHostKeyChecking=no" --no-perms --no-times ./ $SERVER_USER@$SERVER_IP_US:/var/www/html/ai-powered-intelligent-pack-design
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP_US "cd /var/www/html/ai-powered-intelligent-pack-design && sudo bash -c 'source venv/bin/activate  && pip install -r requirements.txt && service ai-powered-intelligent-pack-design  restart'"



